name: Telegram Local Smart Release Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 80

      - name: Build local smart intelligence
        id: smart
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TITLE="${{ github.event.release.name }}"
          AUTHOR="${{ github.event.release.author.login }}"
          URL="${{ github.event.release.html_url }}"
          BODY="${{ github.event.release.body }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"

          PREV_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"

          if [ -n "$PREV_TAG" ]; then
            FILES="$(git diff --name-only "$PREV_TAG"..HEAD | head -120 | tr '\n' ' ')"
            COMMITS="$(git log --pretty=format:'%s' "$PREV_TAG"..HEAD | head -40 | tr '\n' ' ')"
          else
            FILES="$(git diff-tree --no-commit-id --name-only -r HEAD | head -120 | tr '\n' ' ')"
            COMMITS="$(git log --pretty=format:'%s' -30 | tr '\n' ' ')"
          fi

          CONTEXT="$(printf "%s %s %s %s %s" "$TAG" "$TITLE" "$BODY" "$FILES" "$COMMITS" | tr '[:upper:]' '[:lower:]')"

          APK_SCORE=0
          WEB_SCORE=0
          UI_SCORE=0
          AUDIO_SCORE=0
          FIX_SCORE=0
          FEATURE_SCORE=0
          TECH_SCORE=0
          MAJOR_SCORE=0

          add_score() {
            if echo "$CONTEXT" | grep -Eiq "$1"; then
              eval "$2=\$(( $2 + $3 ))"
            fi
          }

          add_score "apk|android|gradle|kotlin|manifest|mainactivity|drawable|mipmap|exoplayer|player|mobile|app/" APK_SCORE 5
          add_score "website|web|vercel|landing|frontend|index\.html|package\.json|vite|next|react|site" WEB_SCORE 5
          add_score "ui|ux|design|layout|icon|logo|splash|theme|visual|interfaz|diseño" UI_SCORE 4
          add_score "audio|music|youtube|metadata|cover|lyrics|player|stream|playback|song" AUDIO_SCORE 4
          add_score "fix|bug|patch|hotfix|crash|error|arreglo|corrige|repair|solve" FIX_SCORE 4
          add_score "feat|feature|new|nuevo|add|added|implement|improvement|mejora|upgrade" FEATURE_SCORE 4
          add_score "ci|workflow|github|actions|build|release|version|refactor|cache|backend|api" TECH_SCORE 3
          add_score "breaking|major|migration|architecture|overhaul|redesign|rewrite" MAJOR_SCORE 8

          if [ "$IS_PRERELEASE" = "true" ] || echo "$CONTEXT" | grep -Eiq "beta|alpha|preview|test|testing|internal"; then
            TYPE_EN="Beta Build"
            TYPE_ES="Versión Beta"
            TYPE_EMOJI="🧪"
          else
            TYPE_EN="Official Release"
            TYPE_ES="Release oficial"
            TYPE_EMOJI="🚀"
          fi

          if [ "$APK_SCORE" -gt "$WEB_SCORE" ]; then
            TARGET_EN="APK / Android Application"
            TARGET_ES="APK / Aplicación Android"
            TARGET_EMOJI="📱"
          elif [ "$WEB_SCORE" -gt "$APK_SCORE" ]; then
            TARGET_EN="Official Website"
            TARGET_ES="Website oficial"
            TARGET_EMOJI="🌐"
          else
            TARGET_EN="FridaMusic Project"
            TARGET_ES="Proyecto FridaMusic"
            TARGET_EMOJI="🎵"
          fi

          VERSION="${TAG#v}"
          VERSION="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"

          if [ "$MAJOR_SCORE" -ge 8 ] || { [ "$MAJOR" -gt 0 ] && [ "$MINOR" = "0" ] && [ "$PATCH" = "0" ]; }; then
            LEVEL_EN="Major Update"
            LEVEL_ES="Actualización mayor"
            LEVEL_EMOJI="🔥"
          elif [ "$FEATURE_SCORE" -ge "$FIX_SCORE" ] && { [ "$FEATURE_SCORE" -gt 0 ] || [ "$MINOR" -gt 0 ]; }; then
            LEVEL_EN="Medium Update"
            LEVEL_ES="Actualización media"
            LEVEL_EMOJI="⚡"
          elif [ "$FIX_SCORE" -gt 0 ] || [ "$PATCH" -gt 0 ]; then
            LEVEL_EN="Minor Fix"
            LEVEL_ES="Fix menor"
            LEVEL_EMOJI="🛠"
          else
            LEVEL_EN="General Update"
            LEVEL_ES="Actualización general"
            LEVEL_EMOJI="🎵"
          fi

          if [ "$UI_SCORE" -gt 0 ] && [ "$AUDIO_SCORE" -gt 0 ]; then
            SUMMARY_EN="UI/UX and music playback areas received improvements for a cleaner and more stable experience."
            SUMMARY_ES="Se mejoraron áreas de UI/UX y reproducción musical para una experiencia más limpia y estable."
          elif [ "$UI_SCORE" -gt 0 ]; then
            SUMMARY_EN="Visual interface and user experience improvements were applied."
            SUMMARY_ES="Se aplicaron mejoras visuales, de interfaz y experiencia de usuario."
          elif [ "$AUDIO_SCORE" -gt 0 ]; then
            SUMMARY_EN="Music playback, metadata, covers, lyrics, or audio stability were improved."
            SUMMARY_ES="Se mejoró reproducción, metadata, carátulas, lyrics o estabilidad de audio."
          elif [ "$WEB_SCORE" -gt "$APK_SCORE" ]; then
            SUMMARY_EN="The official FridaMusic website received presentation, navigation, or deployment improvements."
            SUMMARY_ES="La website oficial de FridaMusic recibió mejoras de presentación, navegación o despliegue."
          elif [ "$FIX_SCORE" -gt 0 ]; then
            SUMMARY_EN="Stability fixes were applied to improve reliability and reduce unexpected behavior."
            SUMMARY_ES="Se aplicaron correcciones de estabilidad para mejorar confiabilidad y reducir errores."
          elif [ "$TECH_SCORE" -gt 0 ]; then
            SUMMARY_EN="Internal technical improvements were added to strengthen the release workflow and project base."
            SUMMARY_ES="Se agregaron mejoras técnicas internas para fortalecer el flujo de releases y la base del proyecto."
          else
            SUMMARY_EN="A new FridaMusic update was published with general improvements and project refinements."
            SUMMARY_ES="Se publicó una nueva actualización de FridaMusic con mejoras generales y refinamientos del proyecto."
          fi

          if echo "$TYPE_EN $TARGET_EN $LEVEL_EN" | tr '[:upper:]' '[:lower:]' | grep -q "beta"; then
            MEDIA_URL="https://media.giphy.com/media/l0HlNaQ6gWfllcjDO/giphy.gif"
          elif echo "$TARGET_EN" | tr '[:upper:]' '[:lower:]' | grep -q "website"; then
            MEDIA_URL="https://media.giphy.com/media/13HgwGsXF0aiGY/giphy.gif"
          elif echo "$LEVEL_EN" | tr '[:upper:]' '[:lower:]' | grep -q "major"; then
            MEDIA_URL="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif"
          elif echo "$LEVEL_EN" | tr '[:upper:]' '[:lower:]' | grep -q "fix"; then
            MEDIA_URL="https://media.giphy.com/media/xUPGcguWZHRC2HyBRS/giphy.gif"
          else
            MEDIA_URL="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif"
          fi

          CAPTION="${TYPE_EMOJI} <b>FridaMusic Smart Update</b>%0A"
          CAPTION+="━━━━━━━━━━━━━━%0A%0A"
          CAPTION+="🇺🇸 <b>English</b>%0A"
          CAPTION+="📦 <b>Type:</b> ${TYPE_EN}%0A"
          CAPTION+="${TARGET_EMOJI} <b>Target:</b> ${TARGET_EN}%0A"
          CAPTION+="🏷 <b>Version:</b> ${TAG}%0A"
          CAPTION+="${LEVEL_EMOJI} <b>Level:</b> ${LEVEL_EN}%0A"
          CAPTION+="👤 <b>Contributor:</b> ${AUTHOR}%0A"
          CAPTION+="🧠 <b>Detected summary:</b> ${SUMMARY_EN}%0A%0A"
          CAPTION+="🇲🇽 <b>Español</b>%0A"
          CAPTION+="📦 <b>Tipo:</b> ${TYPE_ES}%0A"
          CAPTION+="${TARGET_EMOJI} <b>Objetivo:</b> ${TARGET_ES}%0A"
          CAPTION+="🏷 <b>Versión:</b> ${TAG}%0A"
          CAPTION+="${LEVEL_EMOJI} <b>Nivel:</b> ${LEVEL_ES}%0A"
          CAPTION+="👤 <b>Colaborador:</b> ${AUTHOR}%0A"
          CAPTION+="🧠 <b>Resumen detectado:</b> ${SUMMARY_ES}%0A%0A"
          CAPTION+="📥 <b>Download / Descargar:</b>%0A${URL}%0A%0A"
          CAPTION+="━━━━━━━━━━━━━━%0A"
          CAPTION+="👨‍💻 <b>Lead:</b> JAGR Developer%0A"
          CAPTION+="🏢 <b>Organization:</b> Frida Labs%0A"
          CAPTION+="🎵 <b>Project:</b> FridaMusic"

          echo "caption=$CAPTION" >> "$GITHUB_OUTPUT"
          echo "media_url=$MEDIA_URL" >> "$GITHUB_OUTPUT"

      - name: Send Telegram smart notification
        shell: bash
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendAnimation" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=24" \
            -d "animation=${{ steps.smart.outputs.media_url }}" \
            -d "parse_mode=HTML" \
            -d "caption=${{ steps.smart.outputs.caption }}"
