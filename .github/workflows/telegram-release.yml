name: Telegram Free AI Smart Release Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 80

      - name: Build context
        id: ctx
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TITLE="${{ github.event.release.name }}"
          AUTHOR="${{ github.event.release.author.login }}"
          URL="${{ github.event.release.html_url }}"
          BODY="${{ github.event.release.body }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"

          PREV_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"

          if [ -n "$PREV_TAG" ]; then
            FILES="$(git diff --name-only "$PREV_TAG"..HEAD | head -80 | tr '\n' ' ')"
            COMMITS="$(git log --pretty=format:'- %s' "$PREV_TAG"..HEAD | head -30)"
          else
            FILES="$(git diff-tree --no-commit-id --name-only -r HEAD | head -80 | tr '\n' ' ')"
            COMMITS="$(git log --pretty=format:'- %s' -30)"
          fi

          {
            echo "tag=$TAG"
            echo "title=$TITLE"
            echo "author=$AUTHOR"
            echo "url=$URL"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Local semantic detection
        id: local
        shell: bash
        run: |
          TAG="${{ steps.ctx.outputs.tag }}"
          TITLE="${{ steps.ctx.outputs.title }}"
          BODY="${{ steps.ctx.outputs.body }}"
          FILES="${{ steps.ctx.outputs.files }}"
          COMMITS="${{ steps.ctx.outputs.commits }}"
          IS_PRERELEASE="${{ steps.ctx.outputs.is_prerelease }}"

          CONTEXT="$(printf "%s %s %s %s %s" "$TAG" "$TITLE" "$BODY" "$FILES" "$COMMITS" | tr '[:upper:]' '[:lower:]')"

          if [ "$IS_PRERELEASE" = "true" ] || echo "$CONTEXT" | grep -Eiq "beta|alpha|preview|testing|internal|test"; then
            TYPE_EN="Beta Build"
            TYPE_ES="Versión Beta"
          else
            TYPE_EN="Official Release"
            TYPE_ES="Release oficial"
          fi

          if echo "$CONTEXT" | grep -Eiq "telegram bot|bot telegram|telegram|workflow|notification|bot"; then
            TARGET_EN="FridaMusic Telegram Bot"
            TARGET_ES="Bot de Telegram de FridaMusic"
          elif echo "$CONTEXT" | grep -Eiq "website|web|vercel|landing|frontend|index\.html|site|official web"; then
            TARGET_EN="Official Website"
            TARGET_ES="Website oficial"
          elif echo "$CONTEXT" | grep -Eiq "apk|android|gradle|kotlin|manifest|mainactivity|drawable|mipmap|exoplayer|mobile|app/"; then
            TARGET_EN="APK / Android Application"
            TARGET_ES="APK / Aplicación Android"
          else
            TARGET_EN="FridaMusic Project"
            TARGET_ES="Proyecto FridaMusic"
          fi

          VERSION="${TAG#v}"
          VERSION="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"

          if echo "$CONTEXT" | grep -Eiq "breaking|major|overhaul|redesign|architecture|migration|rewrite|level: major"; then
            LEVEL_EN="Major Update"
            LEVEL_ES="Actualización mayor"
            LEVEL_KEY="major"
          elif echo "$CONTEXT" | grep -Eiq "feat|feature|new|add|added|implement|improvement|mejora|nuevo|level: medium"; then
            LEVEL_EN="Medium Update"
            LEVEL_ES="Actualización media"
            LEVEL_KEY="medium"
          elif echo "$CONTEXT" | grep -Eiq "fix|bug|patch|hotfix|crash|error|arreglo|corrige|level: minor"; then
            LEVEL_EN="Minor Fix"
            LEVEL_ES="Fix menor"
            LEVEL_KEY="fix"
          elif [ "$MAJOR" -gt 0 ] && [ "$MINOR" = "0" ] && [ "$PATCH" = "0" ]; then
            LEVEL_EN="Major Update"
            LEVEL_ES="Actualización mayor"
            LEVEL_KEY="major"
          elif [ "$MINOR" -gt 0 ] && [ "$PATCH" = "0" ]; then
            LEVEL_EN="Medium Update"
            LEVEL_ES="Actualización media"
            LEVEL_KEY="medium"
          else
            LEVEL_EN="Minor Fix"
            LEVEL_ES="Fix menor"
            LEVEL_KEY="fix"
          fi

          SUMMARY_EN="$(echo "$BODY" | sed -n '/SUMMARY_EN:/,/SUMMARY_ES:/p' | sed '1d;$d' | head -2 | tr '\n' ' ' | cut -c1-280)"
          SUMMARY_ES="$(echo "$BODY" | sed -n '/SUMMARY_ES:/,/CHANGES:/p' | sed '1d;$d' | head -2 | tr '\n' ' ' | cut -c1-280)"

          [ -z "$SUMMARY_EN" ] && SUMMARY_EN="A FridaMusic TM update was published based on the release notes."
          [ -z "$SUMMARY_ES" ] && SUMMARY_ES="Se publicó una actualización de FridaMusic TM basada en las notas de release."

          {
            echo "type_en=$TYPE_EN"
            echo "type_es=$TYPE_ES"
            echo "target_en=$TARGET_EN"
            echo "target_es=$TARGET_ES"
            echo "level_en=$LEVEL_EN"
            echo "level_es=$LEVEL_ES"
            echo "level_key=$LEVEL_KEY"
            echo "summary_en=$SUMMARY_EN"
            echo "summary_es=$SUMMARY_ES"
          } >> "$GITHUB_OUTPUT"

      - name: Build final message
        id: final
        shell: bash
        run: |
          BODY="${{ steps.ctx.outputs.body }}"

          CHANGES="$(echo "$BODY" | sed -n '/CHANGES:/,$p' | sed '1d' | sed '/^[[:space:]]*$/q' | head -8)"

          if [ -z "$CHANGES" ]; then
            CHANGES="No detailed changes were provided."
          fi

          case "$(echo "${{ steps.local.outputs.level_key }}" | tr '[:upper:]' '[:lower:]')" in
            major)
              MEDIA_URL="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif"
              LEVEL_ICON="🔥"
              ;;
            medium)
              MEDIA_URL="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif"
              LEVEL_ICON="⚡"
              ;;
            fix|minor)
              MEDIA_URL="https://media.giphy.com/media/xUPGcguWZHRC2HyBRS/giphy.gif"
              LEVEL_ICON="🛠"
              ;;
            *)
              MEDIA_URL="https://media.giphy.com/media/l0HlNaQ6gWfllcjDO/giphy.gif"
              LEVEL_ICON="🧪"
              ;;
          esac

          MESSAGE="🎵 <b>FridaMusic TM Smart Update</b>\n"
          MESSAGE+="━━━━━━━━━━━━\n\n"

          MESSAGE+="🇺🇸 <b>English</b>\n"
          MESSAGE+="📦 <b>Type:</b> ${{ steps.local.outputs.type_en }}\n"
          MESSAGE+="🎯 <b>Target:</b> ${{ steps.local.outputs.target_en }}\n"
          MESSAGE+="🏷 <b>Version:</b> ${{ steps.ctx.outputs.tag }}\n"
          MESSAGE+="${LEVEL_ICON} <b>Level:</b> ${{ steps.local.outputs.level_en }}\n"
          MESSAGE+="👤 <b>Contributor:</b> ${{ steps.ctx.outputs.author }}\n"
          MESSAGE+="🧠 <b>Summary:</b> ${{ steps.local.outputs.summary_en }}\n\n"

          MESSAGE+="🇲🇽 <b>Español</b>\n"
          MESSAGE+="📦 <b>Tipo:</b> ${{ steps.local.outputs.type_es }}\n"
          MESSAGE+="🎯 <b>Objetivo:</b> ${{ steps.local.outputs.target_es }}\n"
          MESSAGE+="🏷 <b>Versión:</b> ${{ steps.ctx.outputs.tag }}\n"
          MESSAGE+="${LEVEL_ICON} <b>Nivel:</b> ${{ steps.local.outputs.level_es }}\n"
          MESSAGE+="👤 <b>Colaborador:</b> ${{ steps.ctx.outputs.author }}\n"
          MESSAGE+="🧠 <b>Resumen:</b> ${{ steps.local.outputs.summary_es }}\n\n"

          MESSAGE+="📋 <b>Changes / Cambios:</b>\n"
          CHANGE_COUNT=0

          while IFS= read -r line; do
            if [ -n "$line" ]; then
              CLEAN_LINE="${line#- }"
              CLEAN_LINE="$(echo "$CLEAN_LINE" | cut -c1-120)"
              MESSAGE+="• ${CLEAN_LINE}\n"
              CHANGE_COUNT=$((CHANGE_COUNT + 1))

              if [ "$CHANGE_COUNT" -ge 6 ]; then
                break
              fi
            fi
          done <<< "$CHANGES"

          MESSAGE+="\n📥 <b>Download / Descargar:</b>\n${{ steps.ctx.outputs.url }}\n\n"
          MESSAGE+="━━━━━━━━━━━━\n"
          MESSAGE+="👨‍💻 <b>Lead:</b> JAGR Developer\n"
          MESSAGE+="🏢 <b>Organization:</b> Frida Labs TM\n"
          MESSAGE+="🎵 <b>Project:</b> FridaMusic TM"

          echo "message<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$MESSAGE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "media_url=$MEDIA_URL" >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        shell: bash
        run: |
          echo "Starting Telegram notification..."

          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          THREAD_ID="24"

          MEDIA_URL="${{ steps.final.outputs.media_url }}"
          MESSAGE="${{ steps.final.outputs.message }}"

          if [ -z "$BOT_TOKEN" ]; then
            echo "ERROR: TELEGRAM_BOT_TOKEN is empty"
            exit 1
          fi

          if [ -z "$CHAT_ID" ]; then
            echo "ERROR: TELEGRAM_CHAT_ID is empty"
            exit 1
          fi

          if [ -z "$MESSAGE" ]; then
            echo "ERROR: Message is empty"
            exit 1
          fi

          echo "Sending GIF..."
          GIF_RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendAnimation" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_thread_id=${THREAD_ID}" \
            -d "animation=${MEDIA_URL}")

          echo "GIF response:"
          echo "$GIF_RESPONSE"

          echo "Sending text message..."
          MSG_RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_thread_id=${THREAD_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${MESSAGE}")

          echo "Message response:"
          echo "$MSG_RESPONSE"

          if echo "$MSG_RESPONSE" | grep -q '"ok":false'; then
            echo "Telegram message failed"
            exit 1
          fi

          echo "Telegram notification sent successfully"
