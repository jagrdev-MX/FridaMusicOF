name: Telegram AI Smart Release Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Build release context
        id: ctx
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TITLE="${{ github.event.release.name }}"
          AUTHOR="${{ github.event.release.author.login }}"
          URL="${{ github.event.release.html_url }}"
          BODY="${{ github.event.release.body }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"

          PREV_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"

          if [ -n "$PREV_TAG" ]; then
            CHANGED_FILES="$(git diff --name-only "$PREV_TAG"..HEAD | head -80 | tr '\n' ' ')"
            COMMITS="$(git log --pretty=format:'- %s' "$PREV_TAG"..HEAD | head -30)"
          else
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r HEAD | head -80 | tr '\n' ' ')"
            COMMITS="$(git log --pretty=format:'- %s' -20)"
          fi

          {
            echo "tag=$TAG"
            echo "title=$TITLE"
            echo "author=$AUTHOR"
            echo "url=$URL"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
            echo "changed_files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Local fallback intelligence
        id: fallback
        shell: bash
        run: |
          TAG="${{ steps.ctx.outputs.tag }}"
          TITLE="${{ steps.ctx.outputs.title }}"
          BODY="${{ steps.ctx.outputs.body }}"
          FILES="${{ steps.ctx.outputs.changed_files }}"
          COMMITS="${{ steps.ctx.outputs.commits }}"
          IS_PRERELEASE="${{ steps.ctx.outputs.is_prerelease }}"

          FULL_CONTEXT="$(printf "%s %s %s %s %s" "$TAG" "$TITLE" "$BODY" "$FILES" "$COMMITS" | tr '[:upper:]' '[:lower:]')"

          if [ "$IS_PRERELEASE" = "true" ] || echo "$FULL_CONTEXT" | grep -Eiq "beta|alpha|test|testing|preview|internal"; then
            TYPE_EN="Beta"
            TYPE_ES="Beta"
          else
            TYPE_EN="Official Release"
            TYPE_ES="Release oficial"
          fi

          if echo "$FULL_CONTEXT" | grep -Eiq "website|web|vercel|index\.html|package\.json|landing|site|frontend"; then
            TARGET_EN="Official website"
            TARGET_ES="Website oficial"
          elif echo "$FULL_CONTEXT" | grep -Eiq "apk|android|app/|gradle|kotlin|mainactivity|manifest|drawable|mipmap|player|exoplayer|mobile"; then
            TARGET_EN="APK / Android application"
            TARGET_ES="APK / Aplicación Android"
          else
            TARGET_EN="FridaMusic project"
            TARGET_ES="Proyecto FridaMusic"
          fi

          VERSION="${TAG#v}"
          VERSION="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"

          if echo "$FULL_CONTEXT" | grep -Eiq "breaking|major|overhaul|redesign|architecture|migration"; then
            LEVEL_EN="Major update"
            LEVEL_ES="Actualización mayor"
            EMOJI="🔥"
          elif echo "$FULL_CONTEXT" | grep -Eiq "feature|feat|improvement|mejora|new|nuevo|add|added|agrega|implement"; then
            LEVEL_EN="Medium update"
            LEVEL_ES="Actualización media"
            EMOJI="🚀"
          elif echo "$FULL_CONTEXT" | grep -Eiq "fix|bug|patch|hotfix|arreglo|corrige|error|crash"; then
            LEVEL_EN="Minor fix"
            LEVEL_ES="Fix menor"
            EMOJI="🛠"
          elif [ "$MAJOR" -gt 0 ] && [ "$MINOR" = "0" ] && [ "$PATCH" = "0" ]; then
            LEVEL_EN="Major update"
            LEVEL_ES="Actualización mayor"
            EMOJI="🔥"
          elif [ "$MINOR" -gt 0 ] && [ "$PATCH" = "0" ]; then
            LEVEL_EN="Medium update"
            LEVEL_ES="Actualización media"
            EMOJI="🚀"
          else
            LEVEL_EN="Minor fix"
            LEVEL_ES="Fix menor"
            EMOJI="🛠"
          fi

          if echo "$FULL_CONTEXT" | grep -Eiq "ui|ux|design|interfaz|diseño|layout|icon|logo|splash"; then
            SUMMARY_EN="Visual and user experience improvements were added."
            SUMMARY_ES="Se agregaron mejoras visuales y de experiencia de usuario."
          elif echo "$FULL_CONTEXT" | grep -Eiq "player|audio|exoplayer|youtube|music|metadata|cover|lyrics"; then
            SUMMARY_EN="Playback, music experience, metadata, or audio stability was improved."
            SUMMARY_ES="Se mejoró la reproducción, experiencia musical, metadata o estabilidad de audio."
          elif echo "$FULL_CONTEXT" | grep -Eiq "website|web|vercel|index\.html|landing|site"; then
            SUMMARY_EN="The official FridaMusic website was updated."
            SUMMARY_ES="Se actualizó la website oficial de FridaMusic."
          elif echo "$FULL_CONTEXT" | grep -Eiq "fix|bug|hotfix|patch|error|crash"; then
            SUMMARY_EN="Bugs were fixed to improve stability and reliability."
            SUMMARY_ES="Se corrigieron errores para mejorar estabilidad y confiabilidad."
          else
            SUMMARY_EN="A new FridaMusic update was published with general improvements."
            SUMMARY_ES="Se publicó una nueva actualización de FridaMusic con mejoras generales."
          fi

          {
            echo "type_en=$TYPE_EN"
            echo "type_es=$TYPE_ES"
            echo "target_en=$TARGET_EN"
            echo "target_es=$TARGET_ES"
            echo "level_en=$LEVEL_EN"
            echo "level_es=$LEVEL_ES"
            echo "summary_en=$SUMMARY_EN"
            echo "summary_es=$SUMMARY_ES"
            echo "emoji=$EMOJI"
          } >> "$GITHUB_OUTPUT"

      - name: Try AI intelligence
        id: ai
        shell: bash
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "AI key missing. Skipping AI."
            exit 0
          fi

          PROMPT=$(cat <<'EOF'
          You are FridaMusic release intelligence.

          Return ONLY compact JSON.

          Rules:
          - Bilingual English and Spanish.
          - Detect if this is Beta or Official Release.
          - Detect target: APK Android app, official website, or general project.
          - Detect level: minor fix, medium update, major update.
          - Explain what changed in one short sentence per language.
          - Do not invent changes. Use only provided context.
          - Tone: professional, concise, startup/open-source.

          Required JSON:
          {
            "type_en": "",
            "type_es": "",
            "target_en": "",
            "target_es": "",
            "level_en": "",
            "level_es": "",
            "summary_en": "",
            "summary_es": "",
            "emoji": ""
          }

          Context:
          Tag: ${{ steps.ctx.outputs.tag }}
          Title: ${{ steps.ctx.outputs.title }}
          Author: ${{ steps.ctx.outputs.author }}
          Is prerelease: ${{ steps.ctx.outputs.is_prerelease }}
          Release body: ${{ steps.ctx.outputs.body }}
          Changed files: ${{ steps.ctx.outputs.changed_files }}
          Commits: ${{ steps.ctx.outputs.commits }}
          EOF
          )

          RESPONSE=$(curl -s https://api.openai.com/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg model "gpt-4.1-mini" \
              --arg input "$PROMPT" \
              '{model:$model,input:$input}')")

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.output[0].content[0].text // empty')

          if [ -z "$AI_TEXT" ]; then
            echo "AI returned empty response. Using fallback."
            exit 0
          fi

          echo "$AI_TEXT" > ai.json

          if ! jq empty ai.json >/dev/null 2>&1; then
            echo "AI returned invalid JSON. Using fallback."
            exit 0
          fi

          {
            echo "type_en=$(jq -r '.type_en // empty' ai.json)"
            echo "type_es=$(jq -r '.type_es // empty' ai.json)"
            echo "target_en=$(jq -r '.target_en // empty' ai.json)"
            echo "target_es=$(jq -r '.target_es // empty' ai.json)"
            echo "level_en=$(jq -r '.level_en // empty' ai.json)"
            echo "level_es=$(jq -r '.level_es // empty' ai.json)"
            echo "summary_en=$(jq -r '.summary_en // empty' ai.json)"
            echo "summary_es=$(jq -r '.summary_es // empty' ai.json)"
            echo "emoji=$(jq -r '.emoji // empty' ai.json)"
            echo "ai_success=true"
          } >> "$GITHUB_OUTPUT"

      - name: Choose final intelligence
        id: final
        shell: bash
        run: |
          pick() {
            AI_VALUE="$1"
            FALLBACK_VALUE="$2"

            if [ -n "$AI_VALUE" ] && [ "$AI_VALUE" != "null" ]; then
              echo "$AI_VALUE"
            else
              echo "$FALLBACK_VALUE"
            fi
          }

          TYPE_EN="$(pick "${{ steps.ai.outputs.type_en }}" "${{ steps.fallback.outputs.type_en }}")"
          TYPE_ES="$(pick "${{ steps.ai.outputs.type_es }}" "${{ steps.fallback.outputs.type_es }}")"
          TARGET_EN="$(pick "${{ steps.ai.outputs.target_en }}" "${{ steps.fallback.outputs.target_en }}")"
          TARGET_ES="$(pick "${{ steps.ai.outputs.target_es }}" "${{ steps.fallback.outputs.target_es }}")"
          LEVEL_EN="$(pick "${{ steps.ai.outputs.level_en }}" "${{ steps.fallback.outputs.level_en }}")"
          LEVEL_ES="$(pick "${{ steps.ai.outputs.level_es }}" "${{ steps.fallback.outputs.level_es }}")"
          SUMMARY_EN="$(pick "${{ steps.ai.outputs.summary_en }}" "${{ steps.fallback.outputs.summary_en }}")"
          SUMMARY_ES="$(pick "${{ steps.ai.outputs.summary_es }}" "${{ steps.fallback.outputs.summary_es }}")"
          EMOJI="$(pick "${{ steps.ai.outputs.emoji }}" "${{ steps.fallback.outputs.emoji }}")"

          {
            echo "type_en=$TYPE_EN"
            echo "type_es=$TYPE_ES"
            echo "target_en=$TARGET_EN"
            echo "target_es=$TARGET_ES"
            echo "level_en=$LEVEL_EN"
            echo "level_es=$LEVEL_ES"
            echo "summary_en=$SUMMARY_EN"
            echo "summary_es=$SUMMARY_ES"
            echo "emoji=$EMOJI"
          } >> "$GITHUB_OUTPUT"

      - name: Choose media
        id: media
        shell: bash
        run: |
          TEXT="${{ steps.final.outputs.type_en }} ${{ steps.final.outputs.target_en }} ${{ steps.final.outputs.level_en }}"
          TEXT="$(echo "$TEXT" | tr '[:upper:]' '[:lower:]')"

          if echo "$TEXT" | grep -q "beta"; then
            MEDIA_URL="https://media.giphy.com/media/l0HlNaQ6gWfllcjDO/giphy.gif"
          elif echo "$TEXT" | grep -q "website\|web"; then
            MEDIA_URL="https://media.giphy.com/media/13HgwGsXF0aiGY/giphy.gif"
          elif echo "$TEXT" | grep -q "major"; then
            MEDIA_URL="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif"
          elif echo "$TEXT" | grep -q "minor\|fix"; then
            MEDIA_URL="https://media.giphy.com/media/xUPGcguWZHRC2HyBRS/giphy.gif"
          else
            MEDIA_URL="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif"
          fi

          echo "media_url=$MEDIA_URL" >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        shell: bash
        run: |
          CAPTION="${{ steps.final.outputs.emoji }} <b>FridaMusic Update</b>%0A"
          CAPTION+="━━━━━━━━━━━━━━%0A%0A"
          CAPTION+="🇺🇸 <b>English</b>%0A"
          CAPTION+="📦 <b>Type:</b> ${{ steps.final.outputs.type_en }}%0A"
          CAPTION+="🎯 <b>Target:</b> ${{ steps.final.outputs.target_en }}%0A"
          CAPTION+="🏷 <b>Version:</b> ${{ steps.ctx.outputs.tag }}%0A"
          CAPTION+="🛠 <b>Level:</b> ${{ steps.final.outputs.level_en }}%0A"
          CAPTION+="👤 <b>Contributor:</b> ${{ steps.ctx.outputs.author }}%0A"
          CAPTION+="🧠 <b>Summary:</b> ${{ steps.final.outputs.summary_en }}%0A%0A"
          CAPTION+="🇲🇽 <b>Español</b>%0A"
          CAPTION+="📦 <b>Tipo:</b> ${{ steps.final.outputs.type_es }}%0A"
          CAPTION+="🎯 <b>Objetivo:</b> ${{ steps.final.outputs.target_es }}%0A"
          CAPTION+="🏷 <b>Versión:</b> ${{ steps.ctx.outputs.tag }}%0A"
          CAPTION+="🛠 <b>Nivel:</b> ${{ steps.final.outputs.level_es }}%0A"
          CAPTION+="👤 <b>Colaborador:</b> ${{ steps.ctx.outputs.author }}%0A"
          CAPTION+="🧠 <b>Resumen:</b> ${{ steps.final.outputs.summary_es }}%0A%0A"
          CAPTION+="📥 <b>Download / Descargar:</b>%0A${{ steps.ctx.outputs.url }}%0A%0A"
          CAPTION+="━━━━━━━━━━━━━━%0A"
          CAPTION+="👨‍💻 <b>Lead:</b> JAGR Developer%0A"
          CAPTION+="🏢 <b>Organization:</b> Frida Labs%0A"
          CAPTION+="🎵 <b>Project:</b> FridaMusic"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendAnimation" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "message_thread_id=24" \
            -d "animation=${{ steps.media.outputs.media_url }}" \
            -d "parse_mode=HTML" \
            -d "caption=$CAPTION"
