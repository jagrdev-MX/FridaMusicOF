name: Telegram Release Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Build FridaMusic Telegram release
        id: msg
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          AUTHOR="${{ github.event.release.author.login }}"
          URL="${{ github.event.release.html_url }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          LOGO_URL="https://raw.githubusercontent.com/jagrdev-MX/FridaMusicOF/master/logo1.png"

          VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"

          if [ "$IS_PRERELEASE" = "true" ]; then
            TYPE="🧪 BETA BUILD"
            MOOD="Experimental access"
            MEDIA_URL="https://media.giphy.com/media/l0HlNaQ6gWfllcjDO/giphy.gif"
          elif [ "$MAJOR" -gt 0 ] && [ "$MINOR" = "0" ] && [ "$PATCH" = "0" ]; then
            TYPE="🔥 MAJOR RELEASE"
            MOOD="Big update"
            MEDIA_URL="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif"
          elif [ "$MINOR" -gt 0 ] && [ "$PATCH" = "0" ]; then
            TYPE="🚀 OFFICIAL RELEASE"
            MOOD="Feature update"
            MEDIA_URL="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif"
          else
            TYPE="🛠 MINOR FIX"
            MOOD="Stability patch"
            MEDIA_URL="https://media.giphy.com/media/xUPGcguWZHRC2HyBRS/giphy.gif"
          fi

          CAPTION="🎵 <b>FridaMusic Update</b>%0A"
          CAPTION+="━━━━━━━━━━━━━━%0A%0A"
          CAPTION+="📦 <b>Type:</b> ${TYPE}%0A"
          CAPTION+="🏷 <b>Version:</b> ${TAG}%0A"
          CAPTION+="🧠 <b>Update:</b> ${MOOD}%0A"
          CAPTION+="👤 <b>Contributor:</b> ${AUTHOR}%0A%0A"
          CAPTION+="📥 <b>Download / Descargar:</b>%0A${URL}%0A%0A"
          CAPTION+="━━━━━━━━━━━━━━%0A"
          CAPTION+="👨‍💻 <b>Lead:</b> JAGR Developer%0A"
          CAPTION+="🏢 <b>Organization:</b> Frida Labs%0A"
          CAPTION+="🎵 <b>Project:</b> FridaMusic"

          echo "caption=$CAPTION" >> "$GITHUB_OUTPUT"
          echo "media_url=$MEDIA_URL" >> "$GITHUB_OUTPUT"
          echo "logo_url=$LOGO_URL" >> "$GITHUB_OUTPUT"

      - name: Send animated Telegram release
        shell: bash
        run: |
          MEDIA_URL="${{ steps.msg.outputs.media_url }}"
          LOGO_URL="${{ steps.msg.outputs.logo_url }}"

          if curl --output /dev/null --silent --head --fail "$MEDIA_URL"; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendAnimation" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "message_thread_id=24" \
              -d "animation=$MEDIA_URL" \
              -d "parse_mode=HTML" \
              -d "caption=${{ steps.msg.outputs.caption }}"
          else
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "message_thread_id=24" \
              -d "photo=$LOGO_URL" \
              -d "parse_mode=HTML" \
              -d "caption=${{ steps.msg.outputs.caption }}"
          fi
