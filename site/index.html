<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FridaMusic | Sitio oficial</title>
  <meta name="description" content="FridaMusic, app musical moderna. Sitio visual oficial con accesos directos." />
  <link rel="preload" href="../app/src/main/res/font/be_vietnam_pro_regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="../app/src/main/res/font/be_vietnam_pro_semibold.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="grain"></div>

  <main class="shell">
    <header class="hero glass">
      <div class="brand">
        <img src="../app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.webp" alt="Logo de FridaMusic" class="logo" />
        <div>
          <p class="eyebrow">Proyecto musical</p>
          <h1>Frida<span>Music</span></h1>
        </div>
      </div>

      <p class="tagline">Diseño visual con efecto blur y estilo neon para presentar la app.</p>

      <nav class="cta-grid" aria-label="Enlaces del proyecto">
        <a class="cta primary" href="https://play.google.com/" target="_blank" rel="noreferrer">Google Play</a>
        <a class="cta" href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a>
        <a class="cta" href="https://x.com/" target="_blank" rel="noreferrer">X / Twitter</a>
        <a class="cta" href="https://instagram.com/" target="_blank" rel="noreferrer">Instagram</a>
        <a class="cta" href="mailto:team@fridamusic.app">Contacto del equipo</a>
      </nav>
    </header>

    <section class="showcase glass" aria-label="Vista previa visual">
      <h2>Experiencia FridaMusic</h2>
      <p>Interfaz futurista, minimalista y enfocada en música.</p>
      <img src="../app/src/main/res/mipmap-xxxhdpi/ic_launcher.webp" alt="Ícono principal de FridaMusic" class="show-logo" />
    </section>
  </main>
</body>
</html>
